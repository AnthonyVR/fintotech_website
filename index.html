<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintotech</title>
    <meta
      name="description"
      content="A simple static website ready to deploy on GitHub and Vercel."
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --card: #fffaf2;
        --text: #1f1a17;
        --muted: #665f59;
        --accent: #d96b2b;
        --border: #e7d8c6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(217, 107, 43, 0.16), transparent 35%),
          linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(100%, 680px);
        padding: 48px 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 18px 50px rgba(54, 36, 24, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 auto;
        max-width: 34rem;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        display: inline-block;
        margin-top: 28px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Fintotech</h1>
      <p>
        A minimal static homepage you can push to GitHub and deploy directly on
        Vercel without any build setup.
      </p>
      <a href="https://vercel.com/new" target="_blank" rel="noreferrer">
        Deploy on Vercel
      </a>
    </main>
  </body>
</html>
